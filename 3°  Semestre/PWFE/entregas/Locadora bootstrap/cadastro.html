<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja - Clientes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body class="bg-dark">
    <header class="bg-dark text-white text-center py-5 mb-4">
        <h1>Loja - Cadastro de Cliente</h1> <button class="btn btn-outline-light position-absolute top-0 end-0"
            onclick="abrirModal()">+ Novo Cliente</button>
    </header>
    <main>
        <table class="table">
            <thead class="table-light">
                <tr>
                    <th>Capa do Filme</th>
                    <th>Nome do Filme</th>
                    <th>Lançamento</th>
                    <th>Produtora</th>
                    <th>Gênero</th>
                </tr>
            </thead>
            <tbody id="dados"></tbody>
        </table>
    </main>
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>Novo Filme</h2> <input type="text" id="capa" placeholder="Capa">
            <input type="text" id="nome" placeholder="Nome do Filme">
            <input type="data" id="lancamento" placeholder="Lançamento">
            <input type="text" id="produtora" placeholder="Produtora">
            <input type="text" id="genero" placeholder="Gênero">
            <div class="modal-buttons">
                 <button onclick="salvarFilme()">Salvar</button> <button
                    onclick="fecharModal()">Cancelar</button> </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
