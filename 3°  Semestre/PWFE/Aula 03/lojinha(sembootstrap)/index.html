<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lojinha</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo ">TechStore</div>
        <ul class="links">
            <li>Home</li>
            <li>Produtos</li>
        </ul>
    </nav>
    <header class="ofertas">
        <h1>As melhores ofertas!</h1>
    </header>
    <main class="container">
        <div class="grid-produtos">
            <div class="card">
                <img src="https://m.media-amazon.com/images/I/61tWm6FHXPL.jpg" alt="Produtos">
                <h3>Smartphone Samsung S26</h3>
                <p> R$ 5.000,00 </p>
                <button class="btn-comprar">Comprar</button>
            </div>
            <div class="card">
                <img src="https://i.zst.com.br/thumbs/12/35/35/1929775863.jpg" alt="Produtos">
                <h3>PlayStation 5</h3>
                <p> R$ 4.000,00 </p>
                <button class="btn-comprar">Comprar</button>
            </div>

        </div>
    </main>

</body>

</html>
